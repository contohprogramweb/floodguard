<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Login — FloodGuard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e2d45;
          --accent:#00d4ff;--accent2:#0ea5e9;--text:#e2e8f0;--text-muted:#64748b;
          --danger:#ef4444;--success:#10b981;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);
         min-height:100vh;display:flex;align-items:center;justify-content:center;
         padding:16px;}
    .bg-grid{position:fixed;inset:0;
      background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
      background-size:40px 40px;pointer-events:none;}
    .glow{position:fixed;top:-150px;left:50%;transform:translateX(-50%);
      width:500px;height:350px;
      background:radial-gradient(ellipse,rgba(0,212,255,.07) 0%,transparent 70%);
      pointer-events:none;}
    .container{width:100%;max-width:400px;position:relative;z-index:1;}
    .brand{text-align:center;margin-bottom:24px;}
    .brand-icon{width:52px;height:52px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius:14px;display:inline-flex;align-items:center;justify-content:center;
      font-size:22px;color:#000;margin-bottom:10px;}
    .brand h1{font-size:22px;font-weight:700;letter-spacing:-.3px;}
    .brand h1 span{color:var(--accent);}
    .brand p{font-size:12px;color:var(--text-muted);margin-top:3px;}
    .card{background:var(--surface);border:1px solid var(--border);
      border-radius:16px;padding:24px;}
    .tab-group{display:flex;border:1px solid var(--border);border-radius:10px;
      overflow:hidden;margin-bottom:22px;}
    .tab-btn{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;
      background:transparent;border:none;color:var(--text-muted);cursor:pointer;
      text-decoration:none;transition:all .2s;-webkit-tap-highlight-color:transparent;}
    .tab-btn.active{background:var(--accent);color:#000;}
    .form-group{margin-bottom:15px;}
    .form-label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);
      color:var(--text-muted);font-size:13px;pointer-events:none;}
    .form-control{width:100%;padding:12px 13px 12px 40px;background:var(--surface2);
      border:1px solid var(--border);border-radius:8px;color:var(--text);
      font-family:'Space Grotesk',sans-serif;font-size:16px;/* 16px: no iOS zoom */
      transition:border-color .2s;-webkit-appearance:none;appearance:none;}
    .form-control:focus{outline:none;border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(0,212,255,.1);}
    .form-control::placeholder{color:var(--text-muted);}
    .btn-primary{width:100%;padding:13px;border-radius:8px;
      background:var(--accent);color:#000;border:none;
      font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;
      cursor:pointer;transition:all .2s;margin-top:4px;
      -webkit-tap-highlight-color:transparent;}
    .btn-primary:active{background:#00b8d9;transform:scale(.98);}
    .alert{padding:10px 13px;border-radius:8px;margin-bottom:14px;font-size:13px;
      display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
    .alert i{flex-shrink:0;margin-top:1px;}
    .alert-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;}
    .alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#34d399;}
    .alert-info{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;}
    .link-row{text-align:center;margin-top:18px;font-size:13px;color:var(--text-muted);}
    .link-row a{color:var(--accent);text-decoration:none;font-weight:500;}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="container">
    <div class="brand">
      <div class="brand-icon"><i class="fa-solid fa-water"></i></div>
      <h1>Flood<span>Guard</span></h1>
      <p>Sistem Monitoring & Peringatan Banjir IoT</p>
    </div>
    <div class="card">
      <div class="tab-group">
        <a href="{{ url_for('auth.login') }}"    class="tab-btn active">Login</a>
        <a href="{{ url_for('auth.register') }}" class="tab-btn">Register</a>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">
              <i class="fa-solid fa-circle-info"></i><span>{{ msg }}</span>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" autocomplete="on">
        <div class="form-group">
          <label class="form-label">Kode Sensor Box</label>
          <div class="input-wrap">
            <i class="fa-solid fa-microchip"></i>
            <input type="text" name="kode_sensorbox" class="form-control"
                   placeholder="Contoh: ABC12" required autocomplete="username"
                   inputmode="text" style="text-transform:uppercase;font-family:'JetBrains Mono',monospace;letter-spacing:2px;"
                   oninput="this.value=this.value.toUpperCase()">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <i class="fa-solid fa-right-to-bracket"></i> Masuk
        </button>
      </form>
      <div class="link-row">Belum punya akun? <a href="{{ url_for('auth.register') }}">Daftar sekarang</a></div>
    </div>
  </div>
</body>
</html>
